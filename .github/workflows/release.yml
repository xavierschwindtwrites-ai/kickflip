name: Build and Release KickFlip

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Mac installers
        run: npm run make
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: KickFlip-mac-dmg
          path: out/make/**/*.dmg

      - name: Upload Mac ZIP
        uses: actions/upload-artifact@v4
        with:
          name: KickFlip-mac-zip
          path: out/make/zip/**/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run make

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: KickFlip-windows
          path: out/make/squirrel.windows/**/*.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Mac DMG
        uses: actions/download-artifact@v4
        with:
          name: KickFlip-mac-dmg
          path: ./artifacts

      - name: Download Mac ZIP
        uses: actions/download-artifact@v4
        with:
          name: KickFlip-mac-zip
          path: ./artifacts

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: KickFlip-windows
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/**/*
          generate_release_notes: true
          body: |
            ## KickFlip ${{ github.ref_name }}

            ### Download
            - **Mac**: Download the `.dmg` file below
            - **Windows**: Download the `.exe` file below

            ### Mac installation (first time only)
            1. Download and open the `.dmg`, drag KickFlip to Applications
            2. Try to open KickFlip — macOS will show a warning
            3. Open Terminal and run:
            ```
            xattr -cr /Applications/KickFlip.app
            ```
            4. Double-click KickFlip — it opens normally from now on
